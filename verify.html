<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Verifikasi Email — ANTITHESIS</title>
<link rel="stylesheet" href="style.css"/>
<style>
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);}
.verify-wrap{width:100%;max-width:440px;margin:24px;background:var(--bg2);border:.5px solid var(--border2);border-radius:var(--r-xl);position:relative;overflow:hidden;}
.verify-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:.5px;background:linear-gradient(to right,transparent,rgba(201,168,76,.35),transparent);}
.verify-head{padding:36px 36px 20px;border-bottom:.5px solid var(--border2);text-align:center;}
.verify-icon{font-size:2.5rem;margin-bottom:14px;}
.verify-title{font-family:var(--font-serif);font-size:1.7rem;font-weight:400;color:var(--white);letter-spacing:-.025em;}
.verify-title em{font-style:italic;color:var(--text3);}
.verify-body{padding:24px 36px 32px;}
.verify-msg{font-size:.92rem;color:var(--muted);line-height:1.75;margin-bottom:20px;text-align:center;}
.verify-email{font-style:normal;color:var(--text2);font-weight:600;}
.verify-status{text-align:center;padding:10px 16px;font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px;display:none;border-radius:var(--r);}
.verify-status.ok{background:rgba(48,209,88,.06);border:.5px solid rgba(48,209,88,.18);color:rgba(48,209,88,.9);}
.verify-status.err{background:rgba(255,69,58,.06);border:.5px solid rgba(255,69,58,.18);color:#ff6b6b;}
.verify-status.show{display:block;}
.verify-brand{text-align:center;margin-top:24px;font-size:.6rem;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--muted2);}
.dark-input-wrap{position:relative;margin-bottom:10px;}
.dark-input{width:100%;background:rgba(255,255,255,.05);border:.5px solid rgba(255,255,255,.1);color:var(--white);font-family:var(--font);font-size:.9rem;padding:11px 14px;border-radius:var(--r);outline:none;transition:border-color .15s;}
.dark-input:focus{border-color:var(--blue);}
.dark-input::placeholder{color:var(--muted2);}
.btn-vf{width:100%;background:var(--blue);color:#fff;font-family:var(--font);font-size:.88rem;font-weight:500;padding:11px;border:none;border-radius:var(--r);cursor:pointer;transition:background .15s;margin-top:4px;}
.btn-vf:hover{background:var(--blue2);}
.btn-vf:disabled{opacity:.35;cursor:not-allowed;}
</style>
</head>
<body>
<div class="verify-wrap">
  <div class="verify-head">
    <div class="verify-icon" id="vIcon">📧</div>
    <div class="verify-title" id="vTitle">Verifikasi <em>Email</em></div>
  </div>
  <div class="verify-body">
    <div class="verify-msg" id="vMsg">Memuat...</div>
    <div class="verify-status" id="vStatus"></div>
    <div id="vActions"></div>
    <div class="verify-brand">ANTITHESIS · Al Muayyad Surakarta · 2018–2020</div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAuth,applyActionCode,checkActionCode,sendEmailVerification,signInWithEmailAndPassword,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import{getDatabase,ref,get}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
const app=initializeApp({apiKey:"AIzaSyDF7IAbFI3acQXIHxxoea5cgPTumiUjSMg",authDomain:"antithesis-al-muayyad.firebaseapp.com",databaseURL:"https://antithesis-al-muayyad-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"antithesis-al-muayyad",storageBucket:"antithesis-al-muayyad.firebasestorage.app",messagingSenderId:"1014116431079",appId:"1:1014116431079:web:5f490096bf6ecdf7011e42"});
const db=getDatabase(app);
const auth=getAuth(app);
const params=new URLSearchParams(window.location.search);
const mode=params.get('mode');const oobCode=params.get('oobCode');
const icon=document.getElementById('vIcon'),title=document.getElementById('vTitle'),msg=document.getElementById('vMsg'),status=document.getElementById('vStatus'),actions=document.getElementById('vActions');
function showStatus(type,txt){status.textContent=txt;status.className='verify-status '+type+' show';}
function btnLogin(){return`<a href="login.html" class="btn-vf" style="display:block;text-align:center;text-decoration:none;background:var(--blue);color:#fff;border-radius:var(--r);padding:11px;font-family:var(--font);font-size:.88rem;font-weight:500;margin-top:8px;">Ke Halaman Masuk →</a>`;}
function inputForm(email=''){return`<div style="margin-bottom:12px;"><div class="dark-input-wrap"><input class="dark-input" id="reEmail" type="email" placeholder="Email kamu..." value="${email}"/></div><div class="dark-input-wrap"><input class="dark-input" id="rePass" type="password" placeholder="Password kamu..."/></div></div><button class="btn-vf" id="btnResend">Kirim Ulang Verifikasi →</button><div style="margin-top:8px;">${btnLogin()}</div>`;}
const errMap={'auth/invalid-credential':'Email atau password salah.','auth/user-not-found':'Akun tidak ditemukan.','auth/wrong-password':'Password salah.','auth/too-many-requests':'Terlalu banyak percobaan.'};
function bindResend(){
  setTimeout(()=>{
    document.getElementById('btnResend')?.addEventListener('click',async()=>{
      const email=document.getElementById('reEmail').value.trim();const pass=document.getElementById('rePass').value;const btn=document.getElementById('btnResend');
      if(!email||!pass){showStatus('err','Isi email dan password dulu');return;}
      btn.textContent='Mengirim...';btn.disabled=true;
      try{const cred=await signInWithEmailAndPassword(auth,email,pass);if(cred.user.emailVerified){showStatus('ok','Email sudah terverifikasi! Silakan masuk.');actions.innerHTML=btnLogin();}else{await sendEmailVerification(cred.user);await signOut(auth);icon.textContent='📧';title.innerHTML='Email <em>Terkirim!</em>';msg.innerHTML=`Link verifikasi baru dikirim ke<br><span class="verify-email">${email}</span><br><br>Cek inbox atau folder spam.`;showStatus('ok','Email verifikasi baru berhasil dikirim!');actions.innerHTML=btnLogin();}}
      catch(err){showStatus('err',errMap[err.code]||'Gagal. Coba lagi.');btn.textContent='Kirim Ulang Verifikasi →';btn.disabled=false;}
    });
  },100);
}
if(mode==='verifyEmail'&&oobCode){
  msg.textContent='Sedang memverifikasi email kamu...';
  try{const info=await checkActionCode(auth,oobCode);const email=info.data.email||'';await applyActionCode(auth,oobCode);
  // Ambil data akun dari DB lalu set session dan redirect ke dashboard
  const user=auth.currentUser;
  if(user){
    const snap=await get(ref(db,'antithesis/akun/'+user.uid));
    const data=snap.val()||{};
    const nama=data.nama||user.displayName||email.split('@')[0];
    const username=data.username||user.displayName||email.split('@')[0];
    sessionStorage.setItem('antithesis_member',nama);
    sessionStorage.setItem('antithesis_username',username);
    sessionStorage.setItem('antithesis_uid',user.uid);
    icon.textContent='✅';title.innerHTML='Email <em>Terverifikasi!</em>';
    msg.innerHTML=`Selamat datang, <span class="verify-email">${nama}</span>!<br><br>Mengalihkan ke dashboard...`;
    showStatus('ok','✦ Verifikasi berhasil! Mengalihkan...');
    setTimeout(()=>{window.location.href='dashboard.html';},2000);
  }else{
    // Fallback: user tidak ter-auth otomatis, minta login manual
    icon.textContent='✅';title.innerHTML='Email <em>Terverifikasi!</em>';
    msg.innerHTML=`Email <span class="verify-email">${email}</span> berhasil diverifikasi.<br><br>Kamu sekarang bisa masuk ke portal ANTITHESIS.`;
    showStatus('ok','✦ Verifikasi berhasil!');actions.innerHTML=btnLogin();
  }}
  catch(e){icon.textContent='⚠️';title.innerHTML='Link <em>Kadaluarsa</em>';msg.innerHTML='Link verifikasi sudah tidak berlaku. Masukkan email & password untuk mendapatkan link baru.';showStatus('err','Link tidak valid atau sudah expired');actions.innerHTML=inputForm('');bindResend();}
}else if(mode==='resetPassword'&&oobCode){window.location.href='login.html?mode=resetPassword&oobCode='+oobCode;}
else{icon.textContent='📧';title.innerHTML='Verifikasi <em>Email</em>';msg.innerHTML='Belum menerima email verifikasi? Masukkan email dan password untuk mengirim ulang.';actions.innerHTML=inputForm('');bindResend();}
</script>
</body>
</html>
